apiVersion: 1
datasources:
  - name: HealthLog DB
    type: postgres
    uid: healthlog-db
    url: ${GF_HEALTHLOG_DB_HOST:-healthlog-db:5432}
    database: ${GF_HEALTHLOG_DB_NAME:-healthlog}
    user: ${GF_HEALTHLOG_DB_USER:-grafana_ro}
    secureJsonData:
      password: ${GF_HEALTHLOG_DB_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    editable: false
