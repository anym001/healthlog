<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Proposal 3 - "Activity Rings": the instantly-recognisable Apple Health look,
       three concentric rings on a near-black tile. -->
  <rect width="512" height="512" rx="114" fill="#17171A"/>
  <g fill="none" stroke-linecap="round" transform="rotate(-90 256 256)">
    <!-- track circles -->
    <circle cx="256" cy="256" r="176" stroke="#FF375F" stroke-opacity="0.16" stroke-width="40"/>
    <circle cx="256" cy="256" r="122" stroke="#A6E22E" stroke-opacity="0.16" stroke-width="40"/>
    <circle cx="256" cy="256" r="68"  stroke="#22D3EE" stroke-opacity="0.16" stroke-width="40"/>
    <!-- progress arcs -->
    <circle cx="256" cy="256" r="176" stroke="#FF375F" stroke-width="40"
      stroke-dasharray="912 1200"/>
    <circle cx="256" cy="256" r="122" stroke="#A6E22E" stroke-width="40"
      stroke-dasharray="613 900"/>
    <circle cx="256" cy="256" r="68"  stroke="#22D3EE" stroke-width="40"
      stroke-dasharray="342 600"/>
  </g>
</svg>
