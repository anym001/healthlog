# HealthLog structured configuration (optional).
#
# This file holds BEHAVIOUR and PROFILE — things that are structured and
# hand-edited. SECRETS and INFRASTRUCTURE stay in environment variables
# (INGEST_SECRET, DATABASE_URL, TZ, PUID/PGID, LOG_*, ANALYSIS_CRON,
# NOTIFY_TOKEN); never put secrets here.
#
# Everything below is OPTIONAL and shown commented out with its default. A
# missing or fully-commented file means "use all defaults" — identical to the
# behaviour before this file existed. Copy this to /config/config.yaml and
# uncomment only what you want to change. Path override: CONFIG_FILE.

# --- Physiological profile -------------------------------------------------
# Optional; sharpens HR-based training load (Banister TRIMP) in the workout
# analysis (see docs/workout-analysis.md). Without it, HR_max is derived from
# your data (Tanaka if birth_year is set) and a generic TRIMP weighting is used.
# These are personal but NOT secret and never leave your hardware.
# profile:
#   birth_year: 1990          # enables age-based HR_max (Tanaka: 208 - 0.7*age)
#   sex: unspecified          # male | female | unspecified  (TRIMP weighting)
#   hr_max:                   # optional explicit override (e.g. from a max test)
#   hr_rest:                  # optional override; normally measured from data

# --- Workout analysis ------------------------------------------------------
# Folds workouts into the nightly pipeline as daily-load series (workout_trimp /
# workout_load), so training-load correlations, anomalies and ACWR fall out of
# the existing machinery. With a type_map, an extra per-sport load series is
# emitted for each mapped type (workout_trimp_running, workout_load_cycling, …)
# so one sport's effect on recovery can be told apart from another's.
# workouts:
#   load_metric: both         # trimp | energy | both (which load series to build)
#   edwards: true             # also build zone-based (Edwards) TRIMP from the
#                             #   intra-workout HR series, as a parallel series
#                             #   next to Banister. Self-gating: with no stored
#                             #   HR samples nothing is emitted. Check the archive
#                             #   with `healthlog check-workout-hr`; backfill
#                             #   already-ingested history with
#                             #   `healthlog rederive-workout-hr`.
#   type_map:                 # localised HAE workout name -> canonical type
#     Outdoor Run: running     #   unmapped workouts still feed the aggregate
#     Outdoor Cycle: cycling
#     Traditional Strength Training: strength

# --- Analysis tunables -----------------------------------------------------
# Retune the nightly pipeline without rebuilding the image. Defaults shown.
# analysis:
#   # Correlation (Spearman, FDR-controlled)
#   max_lag: 3                # lag range in days (both directions)
#   min_overlap: 42           # min paired days before a correlation is trusted
#   corr_keep_alpha: 0.10     # keep a correlation when FDR-adjusted p <= this
#   fdr_alpha: 0.05
#   corr_min_active: 10       # min non-zero days per series in a pair's overlap
#                             # (guards 0-filled sparse per-sport workout load)
#   corr_min_abs: 0.25        # effect-size floor: min |coefficient| to report
#                             # (drops significant-but-negligible correlations;
#                             #  calibrated for the residual / de-seasonalised basis)
#   corr_raw_min_abs: 0.15    # raw-corroboration floor: report a residual
#                             # correlation only if the raw series agree in sign
#                             # and reach this |Spearman| (drops residual-only
#                             # artefacts from sparse/derived metrics)
#   # Anomaly (robust rolling median + MAD)
#   anomaly_window: 28        # trailing days for the baseline
#   anomaly_threshold: 3.5    # robust z above which a day is flagged
#   anomaly_recent_days: 14   # only report anomalies this recent
#   anomaly_min_global_z: 2.5 # also require |robust z vs full history| >= this
#                             # (drops window-only spikes, e.g. a hard day after a taper)
#   # Trend / seasonality (STL/MSTL strength)
#   trend_strength_min: 0.30
#   trend_min_monotonicity: 0.70  # also require |Spearman(trend, time)| >= this
#                                 # (drops smooth meanders that have no net direction)
#   seasonality_strength_min: 0.20
#   seasonality_reproducibility_min: 0.30  # year-over-year shape recurrence; rejects
#                                          # one-off clusters MSTL over-fits as "seasonal"
#   # Recovery early-warning (HRV low AND resting HR high)
#   recovery_recent_days: 14
#   recovery_z: 1.5
#   recovery_sleep_z: -1.0    # short sleep that reinforces the alert
#   # Consistency (rolling variability of sleep)
#   consistency_window: 28
#   consistency_duration_std: 1.0   # hours; above => "irregular" duration
#   consistency_bedtime_std: 1.0    # hours; above => "irregular" bedtime
#   # Training load (ACWR = 7-day acute / 28-day chronic workout load); assessed
#   # on the overall load and, with a type_map, per sport.
#   acwr_high: 1.5            # above => load spike flagged (overload risk)
#   acwr_low: 0.8             # below => detraining flagged
#   acwr_min_active_days: 8   # min training days in 28 before a (per-sport) ratio is trusted

# --- LLM narration ---------------------------------------------------------
# On-demand health report from a local Ollama instance. Reads the current
# findings snapshot and asks the model to narrate it as a weekly summary.
# Run manually: docker exec healthlog healthlog narrate [--note "…"]
# Output: /config/narration/YYYY-MM-DD.md (also printed to stdout).
# Off by default (no ollama_url set). Defaults shown.
# narrate:
#   ollama_url:               # required: http://192.168.1.100:11434
#   model: qwen2.5:14b
#   language: en              # en | de
#   lookback_days: 7          # ref_date window for anomalies / recovery / load
#   timeout_s: 300            # generous — 14B models take time
#   max_correlations: 15      # cap the correlations narrated, highest-priority
#                             # first (cross-domain + effect size + lag); 0 = all

# --- Notifications ---------------------------------------------------------
# Push run outcomes / health alerts to a push-notification service. The
# behaviour lives here; the SECRET token does NOT — set it via the NOTIFY_TOKEN
# environment variable. Off until a url is set. Defaults shown.
# notify:
#   type: gotify                    # service selector; only "gotify" today
#                                   # (covers Gotify and PushBits)
#   url: https://push.example.com   # service base URL
#   events: [analysis, findings]    # any of: ingest, analysis, findings
#   level: problems                 # problems | always
#   verify_tls: true
