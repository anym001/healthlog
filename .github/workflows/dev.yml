name: Build dev image

# Maintainer pre-prod channel. Every push to `dev` runs the full test suite
# and, only if green, builds and publishes the mutable `:dev` image to
# GHCR + Docker Hub (needs the DOCKERHUB_* secrets).
on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  tests:
    uses: ./.github/workflows/test.yml

  publish-dev:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push :dev
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: backend/Dockerfile
          push: true
          platforms: linux/amd64
          # Mirrored to GHCR + Docker Hub so both registries stay in sync.
          tags: |
            ghcr.io/${{ github.repository_owner }}/healthlog:dev
            ghcr.io/${{ github.repository_owner }}/healthlog:dev-${{ steps.sha.outputs.short }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/healthlog:dev
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/healthlog:dev-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
